name: Deploy website to GitHub Pages

# Publishes the static landing page in website/ to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ["website/**", ".github/workflows/pages.yml"]
  # Redeploy when a release is published so the version shown on the page
  # (and the download links) always reflect the newest release.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Inject current release version into the page
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name 2>/dev/null || true)
          if [ -n "${TAG:-}" ]; then
            sed -i "s|<span id=\"version-line\">latest release</span>|<span id=\"version-line\">current release ${TAG}</span>|" website/index.html
            echo "Injected version: ${TAG}"
          else
            echo "No published release yet — leaving the JS fallback in place."
          fi
      - uses: actions/configure-pages@v6
      - name: Upload website/ as the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v5

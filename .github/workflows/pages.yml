name: Deploy website to GitHub Pages

# Publishes the static landing page in website/ to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ["website/**", ".github/workflows/pages.yml"]
  # Manually re-run (or via the release process) to refresh the version baked
  # into the page. NOTE: we deliberately do NOT trigger on `release: published`
  # — that event runs on the tag ref (e.g. v0.1.3), which the `github-pages`
  # environment's branch protection rejects ("not allowed to deploy"). The
  # release flow triggers this workflow on `main` via workflow_dispatch instead.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Inject current release version into the page
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name 2>/dev/null || true)
          if [ -n "${TAG:-}" ]; then
            sed -i "s|<span id=\"version-line\">latest release</span>|<span id=\"version-line\">current release ${TAG}</span>|" website/index.html
            echo "Injected version: ${TAG}"
          else
            echo "No published release yet — leaving the JS fallback in place."
          fi
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload website/ as the Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

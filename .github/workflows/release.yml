name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # Gated environment: the signing secrets live here and a maintainer must
    # approve the run before it can sign/publish (see repo Settings → Environments).
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 20, cache: npm }
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev pkg-config
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: src-tauri }
      - run: npm ci
      - name: Build & publish Tauri bundles
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing: signs the .sig artifacts + latest.json so the in-app
          # updater can verify and install new versions. These are the free,
          # self-generated Tauri updater keys (NOT an Apple/Windows code-signing
          # cert) — the public half is pinned in tauri.conf.json > plugins.updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # NOTE: Apple/Windows OS code-signing env is still intentionally omitted —
          # a *present* but empty APPLE_CERTIFICATE makes the bundler attempt (and
          # fail) `security import`. Add those secrets + vars when real OS signing
          # is set up; until then macOS ad-hoc signs and builds cleanly.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TurboFiles ${{ github.ref_name }}"
          releaseBody: "Desktop installers for macOS, Windows and Linux. See CHANGELOG.md (and the in-app Settings → Changelog) for what's new."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: npm ci
      - name: Build & publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: code-signing env vars are intentionally omitted. The Tauri
          # bundler treats a *present* APPLE_CERTIFICATE (even empty) as "sign
          # this", then fails on `security import` with no real cert. With the
          # vars absent, macOS produces an ad-hoc-signed (unsigned) build that
          # bundles cleanly. To enable real signing later, add the APPLE_* /
          # TAURI_SIGNING_* secrets in repo settings and re-introduce them here.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TurboFiles ${{ github.ref_name }}"
          releaseBody: "Desktop installers for macOS, Windows and Linux. See CHANGELOG.md (and the in-app Settings → Changelog) for what's new."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

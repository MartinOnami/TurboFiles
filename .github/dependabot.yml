version: 2
updates:
  # --- npm (frontend) -------------------------------------------------------
  - package-ecosystem: npm
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
    # Roll all routine bumps into a single PR instead of one-per-package.
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    # Don't auto-PR major bumps — they tend to break the build and need a human.
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  # --- cargo (Rust backend) -------------------------------------------------
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  # --- GitHub Actions -------------------------------------------------------
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns: ["*"]
